<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia Registrada</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px 16px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            padding: 60px 40px;
            width: 100%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
        }

        .check-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 36px;
            box-shadow: 0 8px 24px rgba(46, 204, 113, 0.4);
        }

        h1 {
            color: #ffffff;
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        p {
            color: rgba(255, 255, 255, 0.55);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 36px;
        }

        .btn {
            display: inline-block;
            padding: 13px 32px;
            background: linear-gradient(135deg, #e94560, #c62a47);
            color: #ffffff;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 700;
            border-radius: 12px;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(233, 69, 96, 0.55);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="check-icon">✓</div>
        <h1>¡Asistencia registrada!</h1>
        <p>El registro fue guardado correctamente en la base de datos.</p>
        <a href="{% url 'asistencia:formulario' %}" class="btn">Registrar otra asistencia</a>
    </div>
</body>
</html>
